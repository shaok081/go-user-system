<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>用户列表</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 30px;
    }
    h2 {
      text-align: center;
    }
    table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }
    th {
      background: #1677ff;
      color: white;
    }
    button {
      padding: 6px 12px;
      background: red;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .top {
      width: 80%;
      margin: 0 auto 20px auto;
      text-align: right;
    }
  </style>
</head>
<body>
  <h2>用户列表</h2>
  <div class="top">
    <button onclick="logout()" style="background:#555;">退出登录</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>创建时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      alert("请先登录");
      window.location.href = "login.html";
    }

    async function loadUsers() {
      try {
        const res = await fetch("http://localhost:8080/api/users", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "获取用户失败");
          return;
        }

        const table = document.getElementById("userTable");
        table.innerHTML = "";

        data.data.forEach(user => {
          const row = `
            <tr>
              <td>${user.id}</td>
              <td>${user.username}</td>
              <td>${user.created_at}</td>
              <td><button onclick="deleteUser(${user.id})">删除</button></td>
            </tr>
          `;
          table.innerHTML += row;
        });
      } catch (error) {
        alert("请求失败，请检查后端是否启动");
      }
    }

    async function deleteUser(id) {
      if (!confirm("确定删除这个用户吗？")) return;

      try {
        const res = await fetch("http://localhost:8080/api/users/" + id, {
          method: "DELETE",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();
        alert(data.message);
        loadUsers();
      } catch (error) {
        alert("删除失败");
      }
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    loadUsers();
  </script>
</body>
</html>
